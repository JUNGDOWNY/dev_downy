<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./board.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <div class="wrap">
        <div class="button_area">
            <button class="btn_write">글쓰기</button>
        </div>
    </div>
    <script>
        $(document).ready(function(){
            $('.btn_write').on('click',function(){
                let board_Area = 
                `<div class="board_area">
                    <h2>board Form</h2>
                    <form action="#" name="form_board" method="post">
                        <div class="form_item">
                            <label for="title">제목</label>
                            <input type="text" id="title" placeholder="제목을 입력해 주세요"/>
                        </div>
                        <div class="form_item">
                            <label for="writer">작성자</label>
                            <input type="text" id="writer" placeholder="이름을 입력해 주세요"/>
                        </div>
                        <div class="form_item">
                            <label for="content">내용</label>
                            <textarea id="content" placeholder="내용을 입력해 주세요"></textarea>
                        </div>
                        <div class="form_item">
                            <label for="tag">TAG</label>
                            <input type="text" id="tag" placeholder="태그를 입력해 주세요"/>
                        </div>
                        <div class="form_btn_wrap">
                            <button type="button">저장</button>
                            <button type="button">목록</button>
                        </div>
                    </form>
                </div>`
                $('.wrap').append(board_Area);
                $(this).off('click');
            })
        })
    </script>
</body>
</html>
